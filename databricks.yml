# Databricks Asset Bundle - deploys the fund-ops pipeline as a scheduled Job.
# Auth comes from your Databricks CLI profile (e.g. `-p DEFAULT`); no host is
# hard-coded here so the bundle is portable across workspaces.
bundle:
  name: agentic-fund-ops

variables:
  warehouse_id:
    description: Serverless SQL warehouse the pipeline tasks run on (resolved by name for portability; override with --var=warehouse_id=...)
    lookup:
      warehouse: Serverless Starter Warehouse

include:
  - resources/*.yml

targets:
  dev:
    mode: development
    default: true
  prod:
    mode: production
